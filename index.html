<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperPrecios AR</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#F4F5F8; font-family:'Segoe UI',system-ui,sans-serif; }

    .header { background:#111827; color:#fff; padding:16px 24px;
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:12px; position:sticky; top:0; z-index:50;
      box-shadow:0 4px 24px rgba(0,0,0,.4); }
    .header h1 { font-size:20px; font-weight:900; letter-spacing:-.5px; }
    .header h1 span { color:#FFD600; }
    .header p { font-size:11px; color:#888; margin-top:2px; }

    .stats { display:flex; gap:10px; flex-wrap:wrap; }
    .stat { background:#2a2a2a; padding:10px 16px; border-radius:12px; text-align:center; }
    .stat-val { font-size:20px; font-weight:900; }
    .stat-lbl { color:#888; font-size:11px; }

    .container { max-width:1200px; margin:0 auto; padding:20px 16px; }

    .filters { background:#fff; border-radius:14px; padding:14px 18px;
      margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
    .filter-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:8px; }
    .filter-row:last-child { margin-bottom:0; }
    .filter-label { font-size:11px; color:#9ca3af; width:90px; flex-shrink:0; }

    .pill { padding:6px 14px; border-radius:24px; font-size:12.5px; font-weight:700;
      border:1.5px solid #e0e0e0; background:#fff; color:#555;
      cursor:pointer; transition:all .15s; white-space:nowrap; }
    .pill.active { border:none; color:#fff; }

    .search { position:relative; margin-bottom:14px; }
    .search span { position:absolute; left:14px; top:50%; transform:translateY(-50%); }
    .search input { width:100%; padding:12px 14px 12px 40px; font-size:14px;
      border:1.5px solid #e5e7eb; border-radius:12px; background:#fff;
      outline:none; font-family:inherit; }
    .search input:focus { border-color:#FFD600; }

    .result-count { font-size:13px; color:#9ca3af; margin-bottom:12px; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }

    .card { background:#fff; border-radius:16px; padding:16px 18px;
      border:1.5px solid #ebebeb; box-shadow:0 2px 10px rgba(0,0,0,.05);
      display:flex; flex-direction:column; gap:10px; position:relative;
      transition:all .18s; cursor:default; }
    .card:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(0,0,0,.12); }
    .card.oferta { border-color:#FFD600; box-shadow:0 4px 16px rgba(255,214,0,.15); }

    .fav-btn { position:absolute; top:12px; right:12px; background:none;
      border:none; cursor:pointer; font-size:18px; padding:2px;
      transition:all .15s; }

    .badges { display:flex; gap:5px; flex-wrap:wrap; padding-right:30px; }
    .super-badge { font-size:10px; font-weight:800; padding:2px 8px;
      border-radius:20px; letter-spacing:.5px; }
    .cat-badge { font-size:10px; color:#999; padding:2px 7px;
      background:#f5f5f5; border-radius:20px; }
    .time-badge { font-size:10px; color:#bbb; padding:2px 7px;
      background:#f9f9f9; border-radius:20px; margin-left:auto; }

    .product-name { font-size:13.5px; font-weight:600; color:#1a1a1a;
      line-height:1.4; padding-right:4px; }

    .prices { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
    .price { font-size:24px; font-weight:900; letter-spacing:-1px; }
    .price.normal { color:#1a1a1a; }
    .price.oferta { color:#E91E63; }
    .price-original { font-size:13px; color:#ccc; text-decoration:line-through; }
    .discount { font-size:12px; font-weight:800; color:#E91E63;
      background:#FCE4EC; padding:2px 7px; border-radius:10px; }

    .promo { display:inline-flex; align-items:center; gap:3px;
      color:#fff; font-size:10px; font-weight:800; padding:3px 8px;
      border-radius:20px; letter-spacing:.4px; text-transform:uppercase; }

    .empty { text-align:center; padding:60px 20px; color:#d1d5db;
      background:#fff; border-radius:16px; }
    .empty div { font-size:56px; }

    .tabs { display:flex; border-bottom:2px solid #e5e7eb;
      background:#fff; border-radius:12px 12px 0 0; overflow:hidden;
      box-shadow:0 2px 8px rgba(0,0,0,.06); margin-bottom:20px; }
    .tab { padding:12px 24px; font-size:13.5px; font-weight:700;
      border:none; background:none; cursor:pointer; color:#9ca3af;
      border-bottom:3px solid transparent; margin-bottom:-2px;
      transition:all .15s; flex:1; }
    .tab.active { color:#111827; border-bottom-color:#FFD600; }

    .footer { margin-top:36px; padding:18px 22px; background:#111827;
      border-radius:16px; color:#6b7280; font-size:12px; line-height:1.8; }
    .footer strong { color:#FFD600; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const API = "https://web-production-32c3f.up.railway.app";

const SUPER_COLORS = {
  VEA:       { bg:"#FFD600", text:"#000" },
  Carrefour: { bg:"#0066CC", text:"#fff" },
  "MasOnline": { bg:"#E4002B", text:"#fff" },
  Dino:      { bg:"#2E7D32", text:"#fff" },
};

const CAT_LABELS = {
  almacen:"Almacén", bebidas:"Bebidas", lacteos:"Lácteos",
  limpieza:"Limpieza", perfumeria:"Perfumería"
};

function fmt(n) {
  return n != null ? "$" + Math.round(n).toLocaleString("es-AR") : "—";
}

function relTime(ts) {
  if (!ts) return null;
  const d = new Date(ts.replace(" ","T")), now = new Date();
  const mins = Math.round((now - d) / 60000);
  if (mins < 60) return `hace ${mins}m`;
  if (mins < 1440) return `hace ${Math.round(mins/60)}h`;
  return `hace ${Math.round(mins/1440)}d`;
}

function promoColor(promo) {
  if (!promo) return "#1565C0";
  if (/\dx\d/.test(promo)) return "#FF6B00";
  if (promo.includes("unidad")) return "#7B1FA2";
  return "#C62828";
}

function App() {
  const [productos, setProductos] = React.useState([]);
  const [stats, setStats]         = React.useState({});
  const [loading, setLoading]     = React.useState(true);
  const [tab, setTab]             = React.useState("todos");
  const [superFiltro, setSuperFiltro] = React.useState("Todos");
  const [catFiltro, setCatFiltro]     = React.useState("Todas");
  const [soloOfertas, setSoloOfertas] = React.useState(false);
  const [orden, setOrden] = React.useState("reciente");
  const [busqueda, setBusqueda]       = React.useState("");

  async function cargar() {
    setLoading(true);
    const params = new URLSearchParams();
    if (superFiltro !== "Todos") params.append("supermercado", superFiltro);
    if (catFiltro !== "Todas")   params.append("categoria", catFiltro);
    if (soloOfertas)             params.append("ofertas", "true");
    if (tab === "favoritos")     params.append("favoritos", "true");
    if (busqueda)                params.append("busqueda", busqueda);

    const [prods, st] = await Promise.all([
      fetch(`${API}/productos?${params}`).then(r => r.json()).catch(() => []),
      fetch(`${API}/stats`).then(r => r.json()).catch(() => ({})),
    ]);
    setProductos(Array.isArray(prods) ? prods : []);
    setStats(st);
    setLoading(false);
  }

  React.useEffect(() => { cargar(); }, [tab, superFiltro, catFiltro, soloOfertas]);

  React.useEffect(() => {
    const t = setTimeout(cargar, 400);
    return () => clearTimeout(t);
  }, [busqueda]);

  async function toggleFav(id) {
    await fetch(`${API}/productos/${id}/favorito`, { method:"POST" });
    cargar();
  }
  const productosOrdenados = [...productos].sort((a, b) => {
    if (orden === "precio-asc")  return (a.precio || 0) - (b.precio || 0);
    if (orden === "precio-desc") return (b.precio || 0) - (a.precio || 0);
    if (orden === "descuento")   return (b.descuento_pct || 0) - (a.descuento_pct || 0);
    return 0; // reciente — viene ordenado del backend
  });
  const supers = ["Todos", "VEA", "Carrefour", "MasOnline", "Dino"];
  const cats   = ["Todas", ...Object.keys(CAT_LABELS)];

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div>
          <h1>🛒 <span>Super</span>Precios AR</h1>
          <p>VEA · Carrefour · MásOnline · Dino</p>
        </div>
        <div className="stats">
          <div className="stat">
            <div className="stat-val" style={{color:"#FFD600"}}>{stats.total_productos || 0}</div>
            <div className="stat-lbl">Productos</div>
          </div>
          <div className="stat">
            <div className="stat-val" style={{color:"#4CAF50"}}>{stats.favoritos || 0}</div>
            <div className="stat-lbl">Favoritos</div>
          </div>
        </div>
      </div>

      <div className="container">
        {/* Tabs */}
        <div className="tabs">
          {[["todos","Todos los productos"],["favoritos","Mis favoritos"]].map(([key,label]) => (
            <button key={key} className={`tab ${tab===key?"active":""}`}
              onClick={() => setTab(key)}>{label}
              {key==="favoritos" && stats.favoritos > 0 &&
                <span style={{marginLeft:6,background:"#E91E63",color:"#fff",
                  borderRadius:10,fontSize:10,padding:"1px 6px"}}>
                  {stats.favoritos}
                </span>}
            </button>
          ))}
        </div>

        {/* Búsqueda */}
        <div className="search">
          <span>🔍</span>
          <input value={busqueda} onChange={e => setBusqueda(e.target.value)}
            placeholder="Buscar producto en todos los supermercados..." />
        </div>

        {/* Filtros */}
        <div className="filters">
          <div className="filter-row">
            <span className="filter-label">Supermercado</span>
            {supers.map(s => {
              const c = SUPER_COLORS[s];
              return (
                <button key={s} className={`pill ${superFiltro===s?"active":""}`}
                  style={superFiltro===s ? {background:c?.bg||"#1a1a1a",color:c?.text||"#fff"} : {}}
                  onClick={() => setSuperFiltro(s)}>{s}</button>
              );
            })}
          </div>
          <div className="filter-row">
            <span className="filter-label">Categoría</span>
            {cats.map(c => (
              <button key={c} className={`pill ${catFiltro===c?"active":""}`}
                style={catFiltro===c ? {background:"#1a1a1a",color:"#fff"} : {}}
                onClick={() => setCatFiltro(c)}>
                {CAT_LABELS[c] || "Todas"}
              </button>
            ))}
          </div>
          <div className="filter-row">
            <button className={`pill ${soloOfertas?"active":""}`}
              style={soloOfertas ? {background:"#E91E63",color:"#fff"} : {}}
              onClick={() => setSoloOfertas(!soloOfertas)}>
              Solo ofertas y promos
            </button>
          </div>
          <div className="filter-row">
            <span className="filter-label">Ordenar por</span>
            {[["reciente","Más reciente"],["precio-asc","Precio ↑"],["precio-desc","Precio ↓"],["descuento","Mayor descuento"]].map(([key,label]) => (
              <button key={key} className={`pill ${orden===key?"active":""}`}
                style={orden===key ? {background:"#1a1a1a",color:"#fff"} : {}}
                onClick={() => setOrden(key)}>{label}</button>
            ))}
          </div>
        </div>

        {/* Contador */}
        <div className="result-count">
          {loading ? "Cargando..." : `${productos.length} producto${productos.length!==1?"s":""}`}
        </div>

        {/* Grid */}
        {productos.length === 0 && !loading ? (
          <div className="empty">
            <div>🧐</div>
            <p style={{fontSize:16,marginTop:12}}>No hay productos con esos filtros</p>
          </div>
        ) : (
          <div className="grid">
            {productosOrdenados.map(p => {
              const hasOffer = p.descuento_pct || p.promocion;
              const sc = SUPER_COLORS[p.supermercado] || {bg:"#888",text:"#fff"};
              return (
                <div key={p.id} className={`card ${hasOffer?"oferta":""}`}>
                  <button className="fav-btn" onClick={() => toggleFav(p.id)}
                    style={{filter:p.favorito?"none":"grayscale(1) opacity(.35)"}}>
                    {p.favorito ? "❤️" : "🤍"}
                  </button>
                  <div className="badges">
                    <span className="super-badge"
                      style={{background:sc.bg,color:sc.text}}>{p.supermercado}</span>
                    <span className="cat-badge">{CAT_LABELS[p.categoria]||p.categoria}</span>
                    {p.scrapeado_en &&
                      <span className="time-badge">{relTime(p.scrapeado_en)}</span>}
                  </div>
                  <div className="product-name">{p.nombre}</div>
                  <div className="prices">
                    <span className={`price ${hasOffer?"oferta":"normal"}`}>{fmt(p.precio)}</span>
                    {p.precio_original &&
                      <span className="price-original">{fmt(p.precio_original)}</span>}
                    {p.descuento_pct && !p.promocion &&
                      <span className="discount">-{p.descuento_pct}%</span>}
                  </div>
                  {p.promocion &&
                    <span className="promo" style={{background:promoColor(p.promocion)}}>
                      {p.promocion}
                    </span>}
                </div>
              );
            })}
          </div>
        )}

        <div className="footer">
          <strong>Actualizacion automatica:</strong> todos los dias a las 08:00 y 20:00 hs.
          Toca el corazon de cualquier producto para agregarlo a favoritos.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
